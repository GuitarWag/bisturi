# GoReleaser config — builds cross-platform binaries and publishes a GitHub
# Release on each pushed tag. Validate locally with `goreleaser check`.
version: 2

project_name: bisturi

before:
  hooks:
    - go mod tidy

builds:
  - id: bisturi
    main: .
    binary: bisturi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/GuitarWag/bisturi/internal/app.version={{ .Version }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: GuitarWag
    name: bisturi
  draft: false
  prerelease: auto
